exclude: |
  (?x)^(
    \.testvenv/|
    \.venv/|
    venv/|
    \.env\.example|
    .*\.lock
  )

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.testvenv/|
            \.venv/|
            venv/|
            \.env\.example|
            CHANGELOG\.md|
            README\.md|
            .*\.lock|
            tests/.*\.py
          )$

  # Lightweight secret scanner — runs on every commit (fast, no network)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: gitleaks (staged files)
        description: Detect hardcoded secrets in staged content
        # gitleaks is configured via .gitleaks.toml in the repo root

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
